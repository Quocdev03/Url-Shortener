version: "3.8"

services:
    app:
        build: .
        ports:
            - "3000:3000"
        env_file:
            - .env
        environment:
            - NODE_ENV=development
            - DB_HOST=mysql
            - REDIS_HOST=redis
        depends_on:
            mysql:
                condition: service_healthy
            redis:
                condition: service_healthy
        volumes:
            - ./src:/app/src
        command: npm run dev

    mysql:
        image: mysql:8.0
        environment:
            MYSQL_ROOT_PASSWORD: secret
            MYSQL_DATABASE: urlshortener
        ports:
            - "3306:3306"
        volumes:
            - mysql_data:/var/lib/mysql
            - ./src/database/schema.sql:/docker-entrypoint-schemadb.d/schema.sql
        healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-psecret"]
            interval: 5s
            timeout: 5s
            retries: 10

    redis:
        image: redis:7-alpine
        ports:
            - "6379:6379"
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 5s
            timeout: 3s
            retries: 5

volumes:
    mysql_data:
