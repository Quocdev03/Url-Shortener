services:
   nodejs:
      build:
         context: ./backend
         dockerfile: Dockerfile
      ports:
         - "3001:3000"
      env_file:
         - .env
      environment:
         - NODE_ENV=development
         - DB_HOST=mysql
         - REDIS_HOST=redis
      depends_on:
         mysql:
            condition: service_healthy
         redis:
            condition: service_healthy
      volumes:
         - ./backend/src:/app/src
      networks:
         - app-network
      command: npm run dev

   vuejs:
      build:
         context: ./frontend
         dockerfile: Dockerfile
      ports:
         - "5174:5174"
      env_file:
         - .env
      environment:
         - CHOKIDAR_USEPOLLING=true
         - CHOKIDAR_INTERVAL=100
      volumes:
         - ./frontend:/app
         - /app/node_modules
      networks:
         - app-network
      depends_on:
         - nodejs
      command: npm run dev -- --host

   mysql:
      image: mysql:8.0
      environment:
         MYSQL_ROOT_PASSWORD: secret
         MYSQL_DATABASE: urlshortener
      ports:
         - "3306:3306"
      volumes:
         - mysql_data:/var/lib/mysql
         - ./backend/src/database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
      healthcheck:
         test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-psecret"]
         interval: 5s
         timeout: 5s
         retries: 10
      networks:
         - app-network

   redis:
      image: redis:7-alpine
      ports:
         - "6380:6379"
      healthcheck:
         test: ["CMD", "redis-cli", "ping"]
         interval: 5s
         timeout: 3s
         retries: 5
      networks:
         - app-network

volumes:
   mysql_data:

networks:
   app-network:
      driver: bridge
