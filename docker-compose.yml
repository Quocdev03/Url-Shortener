services:

    mysql:
        image: mysql:8
        environment:
            MYSQL_ROOT_PASSWORD: secret
            MYSQL_DATABASE: urlshortener
        ports:
            - "3306:3306"
        volumes:
            - mysql_data:/var/lib/mysql
            - ./backend/src/database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
        healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-psecret"]
            interval: 5s
            timeout: 5s
            retries: 10
        networks:
            - app-network

    redis:
        image: redis:alpine
        ports:
            - "6380:6379"
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 5s
            timeout: 3s
            retries: 5
        networks:
            - app-network

volumes:
    mysql_data:

networks:
    app-network:
        driver: bridge
